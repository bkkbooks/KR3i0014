body:
  text: 錢録卷九右後五代後唐明宗天成錢按同光四年丙戌明宗即位改元天成禁鎔錢為器二年令買賣使八十陌錢四年禁行使鐵鑞錢庚寅改元長興則此錢當是長興前所鑄而五代史後唐紀皆未載右後晉髙祖天福錢按五代史天福三年除鑄錢令又勑曰國家所資泉貨為重宜令三京鄴都諸道州府曉示無問公私應有銅者並許鑄錢仍以天福元寶為文左環讀之委鹽鐵司鑄樣頒下諸道右天福錢自上及下讀之曰鎮寶者盖如通寶重寶之變易其文而李孝美讀作天鎮竊恐不然董逌曰天福鎮寶錢文斯得之矣然云見晉氏舊史今不可考背文黎字意所鑄之地也右後漢漢元錢按後漢髙祖劉知逺於天福十二年丁未稱帝不改元未聞有鑄錢之令戊申隠帝立改元乾佑膳部郎中羅中引請在京置監鑄錢俾銅盡鑄為錢以濟軍用疏奏不報則隠帝亦未嘗鑄錢也然此錢文曰漢元通寳意與後周周元宋初宋元同特未知鑄於何歲時耳洪志讀作漢通元寶非是又背有仰月文仿開元制也右後周世宗周元錢按五代史世宗即位之明年廢天下佛寺三千三百三十六是時國中乏錢乃詔毁銅佛鑄錢又洪志引蘇耆開譚録謂世宗朝鑄周通元寳錢於後殿設巨罏數十親視鼓鑄今按此錢凡四種一其幕無文一為横文在穿上一為星文在穿右一為仰月文在穿左角右南唐元宋永通錢按通考李璟既失江北困於用兵鍾謨請鑄大錢以一當十文曰永通泉寶今前一種是也後一種差小篆書文曰泉貨右元宗開元鐵錢按鍾謨既得罪韓熙載又請鑄鐵錢以一當二陶岳貨志録元宗時以鐵為錢大小一如開元通寶文亦如之徐鉉篆其文比於舊錢輪郭深濶既而是錢大行公私以為便右元宗唐國錢大小凡五按通考五代相承用唐錢諸國割據者江南曰唐國通寶又别鑄如唐制而篆文右元宗大唐錢馬令南唐書元宗鑄大唐通錢與唐國錢通用右前蜀髙祖王建錢凡四品五代史蜀世家武成三年八月有龍見洵陽水中十月麟見壁州十二月大赦改明年為永平元年六年黄龍見大昌池十月大赦改元通正十二月又改明年元曰天漢國號漢天漢元年十二月大赦又改明年元曰光天復國號蜀此錢文曰永平曰通正曰天漢曰光天並自上及右讀之右後主衍錢乹徳咸康二品按光天元年六月建卒子衍立明年改元乾徳乾徳五年改元曰咸康右後蜀主孟昶廣政錢按孟知祥明徳元年卒子昶立不改元仍稱明徳至五年改元廣政十國紀年謂四年改元者謬也右南漢髙祖劉龑乹亨錢梁貞明三年龑即位國號大越改元曰乹亨右乹亨鉛錢大小二種十國紀年劉龑以國用不足鑄鉛錢十當銅錢一乾和後多聚銅錢惟外城得用之城内專用鉛錢禁其出入俸禄非特恩不給銅錢今按龑子晟應乾元年又改元乾和右楚馬殷天䇿大錢五代史殷請於梁依唐太宗故事開天䇿府置官屬太祖拜殷天䇿上將軍董逌曰馬殷據湖南八州地建天䇿府因鑄天䇿府寶右馬殷乹封錢按殷未嘗建號改元史稱髙郁諷殷鑄鉛鐵錢以十當銅錢一亦未言錢文若何十國紀年及湖南故事皆言殷鑄鉛鐵錢文曰乹封泉寶是知此錢為殷鑄盖襲用唐髙宗錢文也然今所收乃銅質意當時原有銅鑄一種而舊史未之及又按洪志亦云以銅為之右閩王審知開元大鐵錢陶岳貨泉録云王審知鑄大鐵錢濶寸餘甚麤重亦以開元通寶為文五百文為一貫俗謂之銠與銅錢並行銠盖閩語無正字也右延羲永隆錢按五代史延羲審知少子也既立更名曦改元永隆鑄大鐵錢以一當十又十國紀年亦云延羲永隆四年八月鑄永隆通寶大鐵錢一當鉛錢百俱不言銅錢今此品乃銅質與洪志所載同據錢大盖延羲鑄無疑右延政天徳鐵錢凡二種按延政延羲弟也延政於晉天福八年改元天徳十國紀年曰天徳二年鑄天徳通寶大鐵錢一當百今所録前一品是已後一種則董逌譜謂建州王氏錢面文天徳重寶者也又延政據建州稱帝國號殷故背文有殷字右幽州劉守光應天錢按遼史聖宗本紀統和十四年夏四月己亥鑿大安山取劉守光所藏錢不言其形制文字也惟董逌謂文曰應天元寶背文曰万此品適合錢録卷九
