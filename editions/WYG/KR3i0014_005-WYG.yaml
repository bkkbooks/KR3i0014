body:
  text: 錢録卷五右漢靈帝四出五銖按終後漢數百年俱行五銖錢桓帝時議改鑄大錢劉陶言其不便乃止至靈帝中平三年鑄四出文錢而獻帝春秋曰靈帝作角錢錢猶五銖而有四道連於邊輪今所收或止背文二道其四出者短不及郭是為小異耳右蜀漢昭烈帝直百錢按昭烈帝取蜀從西曹掾劉巴議鑄直百錢文曰直百亦有勒為五銖者今首一品文直百是巳曰直百五銖則所云勒為五銖者也洪志引舊譜徑七分重四銖今所收大小輕重不一不盡如舊譜所言也右傳形五銖錢大小二種銖字篆法微不同按顧烜謂昭烈鑄傳形五銖盖五字居左銖字居右仿傳形半兩為之右昭烈帝為字錢按洪志言昭烈錢凡四種有一種面文相類背肉麤惡穿左有一為字此品面無文背有為字附録於此右三國吳大帝大錢按吳志嘉禾五年鑄大錢一當五百至赤烏元年又鑄當千錢而洪志謂當千錢有兩品考晉書大者謂之比輪小者謂之四文今大小二等是已右太元貨泉洪志謂不知年代今按東晉孝武帝寧康三年丙子改元太元則此為孝武所鑄顧東晉鼓鑄事不見於史傳攷太元三年詔曰錢國之重寶云云亦止禁百姓銷壞及商賈轉貨與夷人不聞開鑄也又攷凉張駿於晉明帝太寧二年亦改元太元則此錢究未知誰氏鑄後人謂以年號繫錢始於五代宋建武若據此錢則建武又在後當以此錢為始矣右後趙石勒豐貨錢石勒鑄豐貨錢見晉書按此錢梁初猶行之通考謂豐貨錢徑一寸重四銖半代謂之男錢是也右一品文曰漢興洪志以為漢莢錢盖縁顧烜李孝美之誤按成李壽於東晉成帝咸和十三年改國號曰漢改元漢興此當是李夀鑄若云漢初錢文實無據且形質篆法亦與西京全不類今政之謹録於此錢録卷五
  hash: sha256:da782133b58c9cc1a22e60ad184c3b3e085899064e1fde617b32f40da0852a73
