body:
  text: 錢録卷八右唐髙祖開元通寶錢按舊唐書髙祖即位仍用隋五銖錢武徳四年七月廢五銖錢行開元通寶錢給事中歐陽詢制詞及書其字含八分及𨽻體其詞先上後下次左後右讀之自上及左迴環讀之亦通流俗謂之開通元寶錢右開元錢左挑文右開元錢穿上仰月文右開元錢穿上偃月文右開元錢穿下偃月文右開元錢穿下斜月文右開元錢雙月文右開元錢穿右立文以上凡七種舊譜統謂之甲文錢談賓録云初進蠟樣日文徳皇后搯一甲跡故錢上有搯文李孝美曰此錢元字次畫端或有挑向左者世謂之左挑俗甚愛重背文亦有兩甲痕者今按新舊唐書並云置錢監於洛并幽益等州又賜秦王齊王三罏右僕射裴寂一罏以鑄又五年五月又於桂州置監則此背文各種意鑄錢者私為標識以别之耳不盡如前人所云也内府所收各録其一以資攷古者觀覽焉右髙宗乹封錢舊唐書乾封元年封嶽之後又改造新錢文曰乹封泉寶乹字直上封字在左時新錢一文當舊錢之十周年之後舊錢並廢其後以商賈不行米帛涌貴復下詔乹封新鑄之錢令所司貯納更不須鑄仍令天下置罏之處並鑄開元通寶錢右肅宗乹元錢舊唐書乹元元年詔曰御史中丞第五琦奏請改錢以一當十别為新鑄不廢舊錢宜聽於諸監别鑄一當十錢文曰乾元重寶二年三月琦入為相又請更鑄重輪乹元錢一當五十詔從之按此則乹元錢似止於當十當五十小大二種然攷寶應元年改行乾元錢一以當三乾元重棱小錢一以當二重棱大錢亦一以當三㝷又改行乹元大小錢並以一當一則當日所鑄大小雜出而重輪又名重棱且非獨大錢名重輪明矣今所收約有四等並録之右代宗大厯錢按大厯四年正月於絳州汾陽銅原兩監増置五罏鑄錢亦從第五琦請也右徳宗建中錢先是江淮錢監歲鑄錢輸京師而工用轉送之費每貫至二千於是户部侍郎韓洄言商州紅崖冶銅多請復洛源廢監起十罏鑄錢每千錢費九百徳宗從之見舊唐書右徳宗開元大錢二種前一品濶縁者差小按開元錢終唐之世未嘗斷鑄非若宋以後專用年號繫錢改元則須别鑄也據舊唐書食貨志建中初判度支趙贊採連州白銅鑄大錢一當十以權輕重亦未言錢文若何然開元不聞有别種大錢則是時所鑄無疑耳右武宗㑹昌開元錢二十三品新唐書食貨志武宗廢浮屠法永平監官請以銅像鐘磬罏鐸皆歸巡院州縣銅益多鹽鐵使以工有常力不足以加鑄許諸道觀察使皆得置錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢大小徑寸如開元通寶交易禁用舊錢今背文昌字則李紳所進新錢以表年號者也京字則京兆府洛字則洛陽楊字則揚州舊譜謂改以楊字者藍田縣以藍字襄州以襄字江陵府以荆字越州以越字宣州以宣字江西以洪字湖南以潭字兖州以兖字浙西以潤字鄂州以鄂字平州以平字興元府以興字梁州以梁字廣州以廣字東川以梓字西川以益字福州以福字丹州以丹字桂陽以桂字又李孝美謂楊字錢終莫之見遂疑當時已行昌字而未嘗改今則實有此錢臚列可攷也右懿宗咸通錢文曰𤣥寶與他種異洪志引舊譜曰唐咸通十一年桂陽監鑄錢官王彤進新鑄錢文曰咸通𤣥寶尋有𠡠停廢不行右天佑錢按昭宗天復四年辛酉八月子柷立改元天佑是為哀宗立四年唐亡不聞有鑄錢事後唐莊宗仍用天佑年號至癸未始改元同光然亦未嘗聞鑄且以一當幾見於背文者在唐未之有攷元至正時張士誠據吳改元天祐或疑此錢為士誠造顧佑字非祐不敢臆斷也今録於李唐之末還以錢文為据耳右史思明得壹錢按新唐書思明據東都日亦鑄得壹元寶錢以一當開元通寶之百右史思明順天錢二種後一種背文有仰月形按思明鑄得一錢後既而惡其文兆不佳改曰順天元寶張台曰得一順天錢思眀並銷洛陽佛銅所鑄賊平之後還將鑄佛錢録卷八
