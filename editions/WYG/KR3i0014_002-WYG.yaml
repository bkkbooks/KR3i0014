body:
  text: 錢録卷二右周景王錢按國語有景王鑄大錢之文而漢書謂景王更鑄大錢其文曰寶貨此一品差大而文字適合右一品文字漫漶細玩與寶貨二字相近而色澤竒古非秦漢以下製也右銀刀一嘉祐雜志曰王公和學士罷沂州得銀刀一有齊太公杏九字中闕不相屬今按齊太公三字良是字曰杏古篆義雲章有之春秋莊公十三年齊侯㑹于北杏是其地也但云九字殊不可曉然既銘齊而杏又其地當為齊國物無疑稱太公者盖其後世所鑄又九府法錢圜函方始於太公今其錢無可攷洪志以無文錢當之然據其所載則虞錢周初錢秦晉諸國錢下至項梁錢悉無分别未敢以為是也按路史則神農氏已􅒊圜法特穿孔不方耳内府所収無文圜錢有數種縁無徴咸弗登錄今存齊刀用志大槩云右一品二古文皆齊字夻字不可識字据鐘鼎文為北説文為鑛然於錢刀無取舊釋為賀尤未安意是化字即貨字也背文一字如工右一品化字與前類只上二字缺右一品銘作按篆法為工其背文字不可識形制與前數品畧相等右一品面文同前按管子鑄齊大刀皆有銘文此類是也右一品洪志所載引舊譜云唐咸通中詔翰林辨其文為齊歸化今按古篆化字無傍作爿者以其銘齊入於齊大刀之後右五品差小而面背作刻畫狀無文字按莒小刀俱無銘此盖莒小刀耶右一品銘三字與洪志所載合云天寶元年西河郡别駕李㓜竒於長平溪澗中得之因名為長平古刀然其時代不可考矣附於莒小刀之後右六錢皆半兩也以歲久青緑剥蝕遂各成一狀因並録之按漢書秦兼天下銅錢質如周錢文曰半兩重如其文據通典云古稱比唐時三之一一開元錢為古之七銖以上今以開元錢較半兩錢則凡今稱一錢五分左右之半兩大抵皆秦半兩今稱一錢者漢八銖之半兩今稱重五六分以上者漢四銖之半兩也又按史記平凖書漢興以為秦錢重難用内府所收半兩有數種此六錢較重固當是秦半兩耳錢録卷二
  hash: sha256:59a17b9b87d62c7689aab60e41b92455d4fc3d546a7eec417df5b4d05daa6de4
