body:
  text: 錢録卷七右隋文帝五銖白錢本紀開皇五年行五銖錢而隋書食貨志言髙祖既受周禪以天下錢貨輕重不等乃更鑄新錢背面肉好皆有周郭文曰五銖重如其文毎錢一千重四斤二兩三年四月詔四面諸關各付百錢為樣四年嚴舊錢之禁詔不禁者縣令奪半年禄五年詔又嚴其制自是錢貨始一所在流布則此錢為五年以前所鑄本紀所稱盖止就五年詔書言之非始鑄也又通考謂後魏食貨志齊文襄令錢一文重五銖者聽入市用計一百錢重一斤四兩二十銖則一千錢重十二斤以上而隋代五銖錢一千重四斤二兩當是大小稱之差據此則隋代乃以三斤為一斤也又隋志謂是時見用之錢皆須和以錫鑞云云故唐書謂隋行五銖白錢縁錫鑞和鑄故錢色白人遂謂白錢耳今雖歲久晦蝕其白處猶可見右一品差輕小其五字左有䜿文與他品異洪志引舊譜謂五字右邊傍好有一畫餘三面無郭者也舊譜右字當作左今仍原文後開通諸錢仿此右五銖穿上横文右五銖穿下横文右五銖穿上一星右五銖穿下一星右五銖背穿下右一星右五銖背穿下左一星右五銖穿上二星右五銖穿上三星右五銖穿角三星右五銖穿下三星右五銖穿上四星右五銖穿下四星右五銖穿上二直文右五銖背穿上二直文右五銖背穿下三直文又穿角一星右五銖細縁右五銖濶縁以上各種五銖計一十八品按自漢武帝造五銖錢後世形製歧出難以枚舉亦不以五銖為凖但存其名而已又况南北朝民間私鑄益盛其源流弗可探討張台曰五銖錢有穿上一星至五星穿下一星穿上下各一星漫面穿傍一星至三星五字之内上下各一星穿上横文穿下横文細縁濶縁等名今傳者尚多内府所收各録其一其間無穿上五星并上下各一星者穿下三星缺銖字四星一枚面文全蝕且微小並録於此右平當五銖洪志云平當肉郭夷坦當字湮漫或曰漢代所鑄今按平當二字作直楷非漢製也右五銖錢去朱如梁初所行五朱去金以朱為銖也洪志引徐氏説名曰五金錢非是右小錢一品右文曰五左如王意不可曉疑亦五銖字增减也與前品盖俱是五銖别種右大錢一品洪志有之引顧烜説臺主衣庫有此錢文曰五銖七千曰中王之錢而舊譜謂五銖卍千今按篆文乃十千耳至敦素云此錢最大文為錢中之王亦較顧説為勝盖鑄錢者偶為之今罏工凡新開鑄必先造一二枚大者名母錢意即此類又按顧烜乃唐人其時已有此錢則當是六代前製也右五銖大泉亦顧烜譜異錢七種之一右兩銖顧烜曰劉氏錢志所載異錢之一右續銖洪志云形制頗類五銖面無好郭其文右曰續左曰銖今按面文好郭全惟漫平應云漫無好郭也右二種曰雙五曰雙十並見顧烜譜右一種作五字凡四董逌謂之四五錢皆五銖之變文也附於五銖諸品之末右二品洪志俱名曰兩嗇錢董逌曰考字書無嗇字又不與篆合乃引釋真觀書披繬剪髪謂自梵書中出今按嗇字漢甘泉鐙銘原有之然字則又未可並讀作嗇矣至梵書繬字與錢文無涉董説附㑹盖好竒之過意此二品皆左文讀與半兩錢類曰兩兩者如前品續銖此等固不得强為之解矣右大泉二品其一泉字居右曰大泉二十後一品泉字居下曰大泉五十篆法如王莽大泉而面背俱作四出文右一品右曰文左一字不可識穿角作曲文如四出右通行泉寶其漫有仰月形亦洪志所有今按錢文繫寶字始於周景王寶貨後王莽襲用之至唐以後乃槩稱寶如通寶元寶是也此錢文曰寶又仰月形亦與唐鑄相近錢録卷七
