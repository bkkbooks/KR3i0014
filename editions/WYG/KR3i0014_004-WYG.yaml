body:
  text: 錢録卷四右王莽大錢按漢書食貨志莽以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大泉五十按今尺得徑九分有歉大約是時尺度每寸為七分餘惟重只六銖稍贏盖尺寸猶可尋而輕重則閲歲久逺銅質銷蝕固難執一以定之矣右錢文與前大錢同而形制遞小按莽傳莽造寶貨後百姓不從但行小大錢即前品與此錢也又云盜鑄錢者不可禁迺重其法盖官私雜出故此二品又自有小大耳莽錢最多而大泉五十為初鑄攷漢自武帝鑄三官五銖後閲宣元成哀平五世無所變更至是莽始變漢法興作紛然為改制之漸矣右莽契刀食貨志契刀其環如大錢身形如刀長二寸文曰契刀五百右莽錯刀文曰一刀直五千與志合右一品泉志引張台説亦王莽所鑄文曰大黄布刀莽自言黄虞之後大黄莽之自稱也意者莽初謂布刀為一物後乃分為二耶右一品亦泉志所有言宣和五年郭僎為亳州蒙城令村人得之田中柄端有方寸匕三字仿彿𨽻書背有方孔不透身形如刀文曰貨布五百疑王莽鑄今按莽因劉氏為金刀遂改作布不應復有刀形而五百字與契刀適合前大黄布刀亦統言布刀是或其居攝時所為張台謂莽初以刀布為一物者也右莽小錢右么錢右幼錢右中錢右壯錢按莽既僭真罷錯刀契刀及五銖而更作金銀龜貝錢布之品名曰寶貨小錢徑六分重一銖文曰小泉直一次七分三銖曰么泉一十次八分五銖曰幼泉二十次九分七銖曰中泉三十次一寸九銖曰壯泉四十同前大泉五十是為錢貨六品右莽大布右次布右弟布右壯布右中布右差布右厚布右幼布右么布右小布按志小布長寸五分重十五銖自􅷹布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品右莽貨布按莽偽天鳳元年罷大小錢改作貨布其文右曰貨左曰布右一品洪志載入異布類形制分寸均合特面文字作字作字作背文字作當由傳寫之誤洪遵及李孝美譜俱言不可識今按字與舜當金字相近其背文字即貨字即布字也孝美亦言與大黄布刀規制相似而貨布二字復合且莽動輒引黄虞自謂舜後或曾仿當金而而又變其文也縁列於莽貨布之後右莽貨泉按貨布直貨泉二十五貨泉徑一寸重五銖文右曰貨左曰泉枚直一與貨布二品並行右貨泉按凡志云徑一寸者寸為今七分餘則此品稍大為異於前因文同併識於此右一品重十三銖有贏右文貨字猶可辨其左隠起亦泉字色澤竒古非漢以後物疑貨泉别種也右莽錢笵左列錢文二曰大泉五十以是知為莽物也前此圖志俱未收録我朝秀水朱彛尊曝書亭集有之攷其所記與此器無纎豪之差命之曰錢笵者範金必先合土寘笵於此摶土印笵上覆之則錢函方圓皆為凹文然後煎銅液澆其上則錢為凸文而錢文以成故謂之笵此器既不見於他書彞尊之説復未詳其用爰圖於莽諸錢之後并識之如此錢録卷四
