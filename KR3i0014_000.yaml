front:
  text: 欽定四庫全書子部九欽定錢録譜録類一器物之屬
  hash: sha256:123cb912dc41dcc220aa62d6ed91b8415de6c6dea5b2807bebb348ad0a960354
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0014_WYG_000-1a, image: WYG0844/WYG0844-0001a.png}
body:
  text: 提要臣等謹案欽定錢録十六卷乾隆十五年奉敕撰卷一至卷十三詳列歷代之泉布自伏羲氏迄明崇禎以編年為次第十四卷列外域諸品第十五十六卷以吉語異錢厭勝諸品殿焉考錢譜始見於隋志不云誰作其書今不傳唐封演以下諸家所録今亦不傳其傳者以宋洪遵泉志為最古毛氏汲古閣所刋是也然所分正品偽品不知年代又有竒品神品諸目既病淆雜又大抵未覩其物多據諸書所載想像圖之如聶崇義之圖三禮或諸書但有其名而不言其形模文字者則概作外圓內方之輪郭是又何貴於圖耶至所箋釋率多臆測尤不足據為定論是編所録皆內府貯藏得於目覩者為據故不特字迹花紋一一酷肖即圍徑之分寸毫釐色澤之丹黃青緑亦窮形盡相摹繪逼其而考證異同辨訂真偽又皆根據典籍無一語鑿空蓋一物之微亦見責實之道與稽古之義焉至於觀其輕重厚薄而究其法之行不行觀其良窳精粗而知其政之舉不舉千古錢幣之利弊一覽具覩又不徒為博物之資矣乾隆五十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀錢録序臣等謹按厯代錢文前世纂述如顧烜封演姚元澤張台陶嶽金光襲李孝美諸人所著苐散見於載籍久無專書董逌譜則缺而弗全人或疑其贋作今單行於世號為完書者惟南宋洪遵泉志一編而已顧五代十國同一偏安而或列為正品或列為偽品則分類未為悉當其不知年代品與竒品既多混淆而天品神品彌近於誣即其援據紛綸如虞錢夏錢乃下與春秋六國之齊晉楚諸錢更無分别夫秦之半兩則重如其文漢初之半兩則八銖文帝之半兩則四銖而洪志所載又有吳王濞鄧通之半兩究其形模實無徴信武帝創五銖迄於隋室紛起疊出其有可據者赤仄白錢四出兩柱而外多統同莫辨而洪志必強為分屬曰某為某鑄遠及於西涼外至於龜兹則亦未敢以為信矣乃至漢興錢文曰漢興考晉書載記東晉成帝咸和十三年蜀李壽改國號曰漢改元漢興則當為李壽無疑而洪志顧謂之漢初錢引史記平凖書漢興以為秦錢重難用云云則鄰於兒童之見凡此數端率多訛謬臣等奉敕纂輯錢録一書自維荒陋不足仰繼前人而兢兢乎不敢執一巳之見強為附會則亦有可言者外域撒帳異錢厭勝此數種略仍其舊各為一門其他則一以編年之法行之要使世次相承瞭如指掌固不必多分品類至於旁稽逺引則上古傳記寥寥不得不采之路史參以諸家若夫周秦而下下逮有明繫年繫月繫日數千餘歲間班班可考立制改作有廢有興衰旺相乘因革遞變一展卷而列朝政事之大端畢著於此通典通考參差互見之處亦得以探討其源流而究其詳略是亦考鏡之林也又洪氏所志不必原有是錢今則內府之藏周羅几席按狀成圖因文考事此核實而有徴彼憑虛而獨造相提並論固自不侔是書也始事於乾隆庚午之冬月凡疑義斷文臣等遲回而不能論定者悉仰稟睿裁重為釐正越辛未夏仲始克告竣為書十六卷為錢五百六十有七枚輪郭肉好廣狹長短之制形諸繪畫並如其真篆籀分楷行草一肖本文摹之付之剞劂用廣流傳後之覽者無徒悅其古澤等於器玩之末觀則是書之成固九府之鴻規而利用前民之職志矣臣梁詩正臣蔣溥臣汪由敦臣嵇璜臣觀保臣裘曰修臣董邦達臣金德瑛臣錢維城臣于敏中謹序欽定四庫全書子部九錢録總目譜録類一器物之屬卷一伏羲氏帝昊錢至舜當金異布十種附卷二周景王寶貨至秦半兩卷三漢髙祖半兩至武帝赤仄五銖卷四王莽大泉至貨泉錢笵附卷五後漢靈帝四出文五銖至蜀李夀漢興錢卷六宋文帝四銖至後周宣帝永通萬國錢卷七隋文帝五銖白錢至通行泉寶卷八唐髙祖開元通寶至哀宗天佑通寶史思明錢二種附卷九後唐明宗天成元寶至劉守光應天元寶卷十宋太祖宋元通寶至欽宗靖康元寶卷十一南宋髙宗建炎通寶至度宗咸淳元寶錢牌附卷十二遼太祖天贊通寶至金章宗泰和重寶卷十三元武宗至大通寶至明莊烈帝崇禎通寶卷十四外域諸品卷十五撒帳吉語諸品異錢各種附卷十六厭勝諸品
