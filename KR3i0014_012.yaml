body:
  text: 錢録卷十二右遼太祖天賛通寳錢按遼耶律阿保機於後梁末帝貞明二年稱神冊元年至龍徳二年改元天賛遼史食貨志鼓鑄之法先代撒剌的為夷离堇以土産多銅始造錢幣太祖襲而用之遂至富强以開帝業右二品篆文竒古洪志謂不知年代今按亦天賛二字特左文讀耳右穆宗應厯重寳錢遼史穆宗本紀天禄五年九月丁卯即位改元應厯今按是嵗辛亥為後周太祖廣順元年也右景宗乾亨元寳錢按景宗保寧十一年改元乾享是為宗太宗太平興國四年食貨志景宗以舊錢不足於用始鑄乾亨新錢錢用流布右聖宗太平元寳錢乾亨四年聖宗即位改元統和二十九年改開泰開泰元年改元太平則宋真宗天禧五五年也按食貨志聖宗鑿大安山取劉守光所藏錢散諸五計司兼鑄太平錢新舊互用右太平興寳錢與前元寳錢正相類曰興寳者或如石晉之天福鎮寳別為一種背文丁字疑即聖宗之太平七年嵗在丁卯也洪志讀作大興平寳義未安右興宗重煕通寳錢按宋仁宗明道元年為遼興宗景福元年次年遼改元重煕興宗本紀重煕二十二年閏七月己亥長春州置錢帛司右道宗錢五種凡六枚大康有通寳元寳二品按道宗以重煕二十四年即位改元清寧清寧十年冬改明年為咸雍咸雍十年冬改明年為大康大康十年冬改明年為大安大安十年冬改明年為夀隆食貨志言道宗之世錢有四等曰咸雍曰大康曰大安曰夀隆皆因改元易名而不言清寧今此錢具在則清寧中葢亦嘗鼓鑄而史書軼之也右天祚帝乾統天慶錢各一按天祚帝夀隆七年即位羣臣上尊號曰天祚皇帝改元乾統乾統十年改元天慶則宋徽宗政和元年也食貨志天祚之世更鑄乾統天慶二等新錢右西遼夀昌錢按李季興東北諸畨樞要云契丹天祐年號夀昌今攷天祐帝則西遼耶律大石也據天祚帝紀百官冊立大石為帝號葛兒罕復上漢尊號曰天祐皇帝改元延慶無夀昌紀元之説豈正史失之而樞要所云或別有據歟至洪志引北遼通書曰天祚即位夀昌七年云云夀昌葢夀隆之誤耳右小大二品舊譜及洪志俱謂不知朝代今自右及上讀之曰感天元寳按天祐帝在位二十年遺命皇后權國稱制號感天皇后此錢葢其時所鑄也右千秋萬嵗錢董逌曰亦遼國錢遼宋通使時其國人頗擕此錢入中國右一種穿下字曰二右文近天字左文不可識規制篆體類天賛錢疑亦初遼所鑄右大千通寳錢通寳二字倒書之亦見洪志右文丁字與大平興寳錢同右千字錢李孝美曰體如遼錢疑其同出今併附於遼代諸錢之後右夏仁宗天盛元寳錢按夏人慶六年改元天盛時則南宋髙宗之紹興十九年而金錫王之天徳元年也右金煬王正隆元寳錢按煬王天徳五年改貞元貞元四年改正隆則宋紹興之二十六年也食貨志金初用遼宋舊錢天㑹末雖劉豫之阜昌錢亦用之至正隆二年閲四十餘嵗始議鼓鑄三年中都置錢監二京兆置監一三監鑄錢文曰正隆通寳輕重如宋小平錢與舊錢通用右世宗大定通寳錢背文曰申曰酉亦紀年也正隆六年世宗即位改元大定按史大定十年令户部流通官錢十五年諭宰臣増鑄新錢十八年代州立監鑄錢其文曰大定通寳文字肉好又勝正隆之制又二十年名代州監曰阜通又二十二年設官提控阜通監又二十三年以節度領監事又二十七年曲陽縣鑄錢別為一監以利通為名又二十八年京府及莭度州増置流泉務葢金代鼓鑄惟是時最盛右章宗泰和大錢按宋寧宗慶元七年為章宗太和元年食貨志稱泰和四年八月鑄大錢一直十篆文曰泰和重寳與鈔並行此錢是也葢章宗即位罷鑄錢承安二年鑄銀名承安寳貨一兩至十兩分五等毎兩折錢二貫尋以私鑄多寖不能行亦罷之至是始鑄錢計自明昌改元以来凡十二年無置監鑄錢之事錢録卷十二
