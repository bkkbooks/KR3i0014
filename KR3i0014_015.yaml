body:
  text: 錢録卷十五右四品文俱曰天下太平背作水紋及回波或二人或四人九人皆如舞蹈狀形容太平之樂事紀盛德也右一品李孝美謂文曰皇帝萬嵗曰忠孝𫝊家洪志所録有此錢按前漢書髙帝紀殿上羣臣皆稱萬嵗稱天子曰萬嵗始此右一品文曰長命富貴背文有仰月形按崇髙莫大乎富貴富貴二字相聮屬始此又風土記端午造百索繫臂名曰長命縷右一品文曰長命守富貴李孝美曰見此錢於汝海王霖家右一品文曰五男二女三公九卿按周禮揚州其民二男五女又五男二女見東京夢華録三公九卿語本禮記又三公上應垣宿九卿下括河海後漢李淑語也右一品文亦曰五男二女面背同右一品文曰金玉滿堂老子道德經語也背文作雙螭董逌謂有所謂異錢雖不見於𫝊記然制作之近古者録之如李唐撒帳錢其文曰長命富貴金玉滿堂忠孝𫝊家五男二女天下太平云云以上數種皆是按唐睿宗女荆山公主出降鑄金銀錢撒帳故董逌謂李唐撒帳錢然此則並以銅為之特仿其制度耳內府所收正用諸品而外岐出不同亦莫識其何所用之如洪志竒品神品諸類並著之於圖亦好古者所不廢也右一品文六出六字按晉書石勒載記建德校尉王和掘得一鼎容四斗中有大錢三十文曰百當千千當萬故洪志謂之鼎錢此錢制不為大而文同蓋後人仿造取吉語耳右瑞錢按南齊祥瑞志泰始中世祖治盆城得一大錢文曰太平百嵗此文同右瑞錢按三國典略北齊文宣帝即位廣宗郡獻瑞錢文曰歸于聖帝此文同右一品洪志謂之長年錢文曰長年太寶按宫閣記未央宫有宣明長年溫室昆明四殿又唐書禮樂志玉牒以通意於天或祈長年錢文蓋祈年意也右一品仿五銖制故文曰五銖穿上下橫出君宜侯王四字猶詩稱宜君宜王耳右一品文曰定生貴子按公羊𫝊子以母貴母以子貴則貴子其說已古非近代語也右一品一面曰日入千金一面曰長母相忘按公羊𫝊注百金猶百萬也古者金重一斤若今萬錢又史記平凖書注黃金一斤直萬錢非也秦以一鎰為一金漢以一斤為一金云云今人但知以二十四銖為一金因録此錢併志之右一品洪志謂之豐樂錢李孝美曰有辨古文者謂是天清豐樂四字亦吉語也右一品文曰千秋萬嵗背文夷漫右一品文與前同一面作蟠龍抱珠之狀右龍鳯錢二種背文一作翔鶴四一為四人各執刀楯之象象武舞也右龍鳯重輪錢永通泉貨用南唐後主錢文也右龍鳯錢鏤刻􅌑瓏面背無異右雙龍錢二種微有大小俱空鏤與前品同右雙龍錢面文凸起背無文右雙鳯錢空鏤面背同右雙鳯錢右龍文錢右一畫龍文錢與前品並如洪志所録右一品一面為龍鳯各一一面為雙魚右雙魚錢二種按漢唐器多為雙魚形此前一品洪志有之引洞冥記名輕影錢後一種面背並空鏤如一右臺閣錢空鏤為樓閣人物之象右二種舊譜謂之花錢並空鏤二面與前同意皆撒帳類也右龜背文錢太平百錢四字用梁武帝時錢文也右水紋錢亦曰太平百錢作篆𨽻二種右雀錢一面為雀形二翩飛上下一面作三雀銜花之狀洪志謂之三雀錢中篆五行大布四字用後周武帝錢文也又二字不可識右一品洪志謂之四事錢二人相向一立一趺坐上下作飛走物各一背文夷漫右井紋錢背面同亦見洪志右羅紋錢右翅紋錢並與洪志所録同右二種曰飛黃曰渠黃按飛黃為六間之一渠黃為八駿之一所謂地用莫如馬耶右一種周郭如常制别作三柱外出按舊唐書元和元年黃河岸塌處得古錢方孔三足豈即此錢耶從洪志附録於此右一種名蟻鼻錢亦詳洪志右藕心錢凡五按洪志引舊譜曰世有此錢狀如博棊下闕如藕挺中破狀其上有首形如稱錘鼻有孔號為藕心錢此前一品是也後四品俱見宣和博古録錢録卷十五
