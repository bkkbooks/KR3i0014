body:
  text: 錢録卷三右漢初半兩錢較秦錢稍輕狀亦各不同並録之按漢書髙后二年秋七月行八銖錢應劭注曰本秦錢質如周錢文曰半兩考二十四銖為一兩今曰行八銖錢而文作半兩然則襲其名耳實非半兩也馬端臨謂漢初患秦錢重更鑄榆莢人患太輕故復行此右文帝半兩錢較漢初更輕小形模字畫各異亦並録之按漢書文帝五年更鑄四銖錢其文為半兩然則文半兩而稱曰四銖亦猶前八銖但仍半兩之名耳又吳王濞鄧通並盜鑄錢西京雜記謂文字肉好與漢錢同洪志輒謂某為濞錢某為通錢實無據因録此併政之右武帝三銖錢按漢書武帝建元元年行三銖錢顔師古注曰新壞四銖錢造此錢也重如其文右一品為武帝有郭半兩錢按漢書武帝建元五年罷三銖錢行半兩錢顔師古注曰又新鑄作也明非八銖四銖之舊然其異同莫辨此品則以有郭為異故録之李孝美曰張台說有傳形者有肉郭者有對文者有隱起字者右一品為三竪文半兩錢洪志曰封氏云半兩錢有穿下三竪文者右一品為傳形半兩錢張台說是也謂之傳形者半字居左兩字居右如紙背傳模然右武帝金錢三品按武帝紀元狩四年有司請收銀錫造白金皮幣以足用此即白金也又食貨志造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故白金品其一重八兩圜之其文龍名白撰直三千其二以重差小方之其文馬直五百其三復小橢之其文龜直三百右皆五銖錢按武帝紀元狩五年罷半兩錢行五銖錢世謂五銖輪郭周正輕重得中可以為法然行五銖後因民多姦鑄乃鑄赤仄五銖食貨志言後二年赤仄又廢於是禁郡國毋鑄錢專令上林三官鑄故有三官五銖之名蓋漢之錢法屢變惟三官五銖為無弊顧今所收五銖甚夥惟赤仄其輪郭色赤後漢靈帝五銖有四出文昭烈帝有直百字梁敬帝有四柱文隋文帝五銖錢色白尚可辨至於後漢世祖建武十六年復行五銖曹魏明帝從司馬芝請行五銖五代宋文帝錢名當兩亦文曰五銖梁武帝亦鑄五銖又陳文帝天嘉三年元魏世宗永平三年西魏文帝大統六年並鑄五銖乃至董卓亦鑄五銖見袁宏漢紀凉張軌鑄五銖見晉書載記又疏勒龜兹以地近西凉並有五銖錢其形制無考不能名某錢為某代所鑄也而洪志必强為分屬臚列於各朝之下實為臆斷兹録其稍有等差者三種如右繫之漢武明創始耳右一品所謂赤仄五銖也漢書武帝元鼎二年令京師鑄官赤仄注曰以赤銅為其郭也此錢郭稍赤色雖年久仍與他錢異未知作法云何錢録卷三
