body:
  text: 錢録卷一右一品洪遵泉志云張台見於寶鼎尉王鑄處然不能名為何代也按路史太昊伏羲氏聚天下之銅仰視俯觀以為棘幣注曰乃帝昊字幕文作李孝美所謂了傍斜畫者蓋羲字此布文適合其字字引盄鐘暨封禪文似不為無據此貨幣之始神農氏聚天下之貨交易而退說者謂貨即貨布此品有字勾畫甚精路史云是神字神農布也又言其好圓形制亦合路史又謂神農錢無周郭面七字縱橫此品近之而文不可讀路史黃帝有熊氏作貨幣其文為二斤全背文串據張台云有如二字者金邊安爪者山下安中者兩口相重者蓋四字也而路史則云五字不可考背文與面文苐一字同右四品文字同前一品但倒置耳洪志謂是安陽之吉貨五字二品大者一柄中有豎一柄上有穿二品小者一有穿一無穿皆無背文路史亦以為黃帝貨也右金刀劉恕外紀謂黃帝範金為貨製金刀洪志載古刀其直文大小俱合少昊氏作布貨面文有此品文字合說者謂作化字􅂒字金字亦本路史按羅氏論幣所起一篇長平布中有作以舌一及作允平侖者有肉郭皆髙陽金右二品字類平類允而左文並同幕作斜直文象水蓋泉耳按髙陽金有十等此二品有文類陽字與前品同因識於此路史又言堯布文作上十全此文字近之即亦倒書也洪志異布一文曰與此類而李孝美譜謂不可識按舜得䇿乘馬之數乃割髙􅀈倮太衍䡆羣害以作䇿馬貨當金貨一金二金二四金二五金䇿乘馬幣故董逌謂文當為尚金為全䇿為乘馬為正䇿字釋未詳正字則此乃王字當金明白可曉當金者當重金說見管子右二品面背無文字姚元澤譜云三代以上布也髙陽氏金有文作隆􅀈者此左文稍倣佛而右文不類右二品面皆有文字而青緑剝蝕不可摹寫右一品有好無輪郭好下作豎文足間圓形右一品無好郭足間亦圓形右一品疑泉字又類張台所謂山下安中者即倒書之金字也洪志據舊譜謂此布面文五字不可識今按左文與前金字同右一品面文類堯布而缺二字洪志所未載合前品為十種其原始莫可考録之三代之前不敢臆為斷也錢録卷一
