  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0014_WYG_010-1a, image: WYG0844/WYG0844-0104a.png}
body:
  text: 錢録卷十右宋太祖宋元通寶錢宋史食貨志太祖初鑄錢文曰宋通元寶今按唐鑄開元錢舊唐書言歐陽詢制詞曰開元流俗讀為開通元寶然則此錢亦當自上及下讀之而史緣淳化以下諸錢多右旋讀故併此稱為宋通元寶也右太宗太平通寶錢按食貨志太宗改元太平興國更鑄太平通寶錢右太宗淳化元寶錢三體書按端拱二年改元淳化及鑄錢文太宗親書淳化元寶作真行草三體又律厯志淳化二年詔定稱法以御書三體淳化錢校實二銖四絫為一錢者二千四百得十有五斤為一稱之則又按真書元字亦左挑如開元錢右太宗至道元寶錢亦三體書按淳化六年改元至道右真宗錢咸平元寶有大小二種祥符有通寶元寶二種景德文曰元寶天禧曰通寶凡六枚按真宗朝凡五改元皆著於錢文至天禧六年改元乾興未開鑄右仁宗錢三品凡六枚篆書真書二體文俱為元寶按仁宗即位之次年改元天聖十年改元明道明道三年改景祐右仁宗皇宋通寶錢亦二體書其真書者又一種差小按景祐五年改元寶元食貨志謂改元更鑄皆曰元寶而冠以年號至是改元寶元文當曰寶元元寶仁宗特命以皇宋通寶為文右仁宗慶厯大錢二種文俱曰重寶而讀各不同按史慶厯末葉清臣為三司使與學士張方平等上陜西錢議曰關中用大錢本以縣官取利太多致姧人盜鑄其用日輕請以江南儀商等州大銅錢一當小錢三云云蓋其時大錢皆當十當五工費輕而民間邀利者多毁小錢私鑄故清臣等言之右仁宗皇祐元寶錢按慶厯九年改元皇祐右仁宗至和元寶錢篆書真書二體按皇祐九年改元至和右至和通寶錢真書右仁宗嘉祐通寶錢篆書真書二體按至和元年改元嘉祐右嘉祐元寶錢真書右英宗治平元寶錢篆書真書二體按嘉祐八年英宗即位次年改元治平食貨志治平中饒池江建韶儀六州鑄錢百七十萬緡右治平通寶錢亦二體書特大小有間右神宗篆書熙寧元寶錢前一種稍大後二種篆法各不同並録之按治平三年神宗即位次年改元熙寧右真書熙寧元寶錢右熙寧重寶大錢亦二體書按通考神宗熙寧四年陜西轉運使皮公弼言頃嵗西邉用兵始鑄當十錢後兵罷多盜鑄者乃以當三又減作當二行之至今銅費相當盜鑄衰息請以舊銅鉛盡鑄當二錢從之折二錢遂行天下云云則此大錢前為當十後減作當二者也餘品悉謂之小平錢矣右神宗元豐通寶大錢較熙寧大錢略相等按熙寧十一年改元豐食貨志言元元豐以陜西師大舉邉用匱缺徐州置寶豐下監嵗鑄折二錢二十萬緡右元豐通寶錢篆書行書二體按神宗朝鼓鑄最繁食貨志言諸路大率務於增額而通考載諸路鑄錢總二十六監每年鑄銅鐡錢五百四十九萬九千二百三十四貫右哲宗元祐通寶錢二體書按元豐八年哲宗即位罷舊所增置鑄錢監凡十四次年改元元祐至元祐八年八月庚午乃詔陜西復鑄小銅錢右元祐通寶大錢蓋折二錢也亦二體書按食貨志元祐八年令折二銅錢許行於陜西及河東京西諸路仍限二年毋更用尋以人言折二錢不通行非便乃聽行使如舊右哲宗紹聖元寶錢亦二體書按元祐九年改元紹聖又考哲宗本紀紹聖元年正月辛丑罷河東大銅錢三年十二月癸酉置施州鑄錢廣積監右紹聖通寶錢行書右紹聖元寶大錢折二也亦篆書行書二體右哲宗元符通寶錢亦二體書食貨志元符二年下陜西諸路博究利害於是詔陜西悉禁銅錢在民間者盡送官而官銅悉取就京西置監右行書元符通寶大錢亦折二也右徽宗聖宋元寶大錢篆書行書二體按徽宗本紀崇寧元年十二月庚申鑄當五錢又食貨志崇寧二年五月令陜西及江池饒建諸州以每嵗所鑄小平錢增料改鑄當五大銅錢以聖宋通寶為文今所録二種皆文曰元寶意當時原有通寶元寶二品耶右聖宋元寶錢亦二種書篆書者後一種更輕小皆小平錢也按此錢與前折五錢皆一時所鑄食貨志稱三年遂罷鑄小平錢及折五錢置監於京城所復徐州寶豐衛州黎陽監並改鑄折二錢為折十蓋此錢與折五錢鑄於崇寧三年以前及蔡京秉國鋭意欲興當十錢遂未久與舊折錢二咸罷廢不行也右徽宗崇寧大錢𨽻書真書二體文曰重寶曰通寶而讀各不同按本紀崇寧三年正月戊子鑄當十大錢又食貨志崇寧四年立錢綱驗樣法崇寧監以所鑄御書當十錢來上緡用銅九斤七兩有竒鉛半之錫居三之一詔頒其式於諸路令赤仄烏背書畫分明又通考尚書省言崇寧監鑄御書當十錢每貫重一十四斤七兩用銅九斤七兩二錢鉛四斤一十二兩六錢錫一斤九兩二錢去火耗一斤五兩每錢重三錢右徽宗大觀通寶大錢真書按崇寧六年改元大觀先是崇寧所鑄當十錢不便於民而私鑄日衆重罰不能止右僕射趙挺之御史沈畸屢以為言遂減作當五或當三繼復罷鑄至是蔡京復相再主用折十錢食貨志稱大觀元年二月首鑄御書當十錢以京畿錢監所得私錢改鑄尋興復京畿兩監以轉使宋喬年領之喬年鑄烏背漉洞錢來上詔以漉銅錢頒行諸路右大觀通寶錢亦真書按本紀大觀四年正月癸卯罷改鑄當十錢二月庚辰罷京西錢監食貨志稱蔡京復罷政矣詔止鑄舊額小平錢是也右徽宗政和通寶錢篆書分楷二體按大觀五年改元政和食貨志稱政和元年詔往嵗圖利之臣鼓鑄當十錢茍濟目前不究悠久公私為害行之幾十年其法日弊見在當十錢可並作當三而張商英請收當十錢母更用俟錢入官擇其惡者鑄小平錢從之此錢是也右政和通寶大錢亦二體書按食貨志初蔡京主行夾錫錢詔轉運副使許天啓推行其法以夾錫錢一折銅錢二會京罷政遂不行至政和二年京復相奏昨鑄夾錫錢精善請復鑄如故遂以政和錢頒為式此錢是也右徽宗宣和通寶錢四種前一種篆書後三種以次遞小俱作分楷按政和七年改元重和次年改宣和食貨志稱東南錢額不敷宣和以後尤甚乃令饒贑錢監鑄小平錢右宣和通寶大錢三種前二種篆書分楷二體後一種亦分楷而細緣稍大於前按食貨志鑄小平錢後又令江池饒錢監盡以小平錢改鑄當二錢以紓用度此錢即當二也右欽宗靖康元寶大錢與宣和當二錢規制相等按宣和七年徽宗內禪次年改元靖康錢録卷十
