body:
  text: 錢録卷十三右元武宗錢二品前一品曰至大通寶楷書後一品曰大元通寶西畨篆書按食貨志武宗至大三年初行錢法立資國院泉貨監以領之其錢曰至大通寶者一文凖至大銀鈔一釐曰大元通寶者一文凖至大通寶錢一十文右順帝至正通寶錢凡三種以次遞小前一種及最小一種背文西畨篆讀作巴納蓋梵語錢字也其第二種背文上一字亦西畨篆讀作額下楷書曰二蓋當二耳按史元世交鈔寶鈔皆印造錢文無鼓鑄之事惟武宗一置監鑄錢然仁宗皇慶元年即下詔廢不行所立院監悉皆罷革而專用至元中統鈔順帝至正十年丞相脫脫始復建議開鑄置寶泉提舉司鑄至正錢與交鈔通用謂子母相權顧所鑄不能流通至其後乃並鈔亦不行所在郡縣皆以物貨相貿易公私所積之鈔人視之若廢楮蓋自錢法敝而鈔法亦壞矣右明太祖大中通寶大錢按明㑹典太祖初置寶源局於應天鑄大中通寶錢及平陳友諒命江西行省置貨泉局頒大中通寶錢大小五等錢式此其大錢也明太祖始建國號意在大中既而祈天乃得大明故當時錢文有此蓋未紀元以前自稱吳王時所鑄耳右太祖洪武通寶錢五品凡六枚背文曰十曰五錢曰三錢二錢一錢按㑹典太祖即位令户部及各行省鑄洪武通寶錢其制為五等當十錢重一兩當五重五錢當三當二重如其當之數小錢重一錢首二枚背文又浙字福字蓋各行省所記如唐㑹昌錢制也右洪武通寶小錢按洪武四年改鑄小錢此錢背無文較前五等式小錢稍重而肉好更工緻右成祖永樂通寶錢按㑹典永樂九年鑄右仁宗洪熙通寶錢右宣宗宣德通寶錢按㑹典宣德九年鑄右英宗正統通寶錢右英宗天順通寶錢右憲宗成化通寶錢右孝宗𢎞治通寶錢按㑹典𢎞治十六年鑄右世宗嘉靖通寶錢按㑹典嘉靖六年題准鑄造嘉靖通寶錢事例七年鑄嘉靖通寶錢又差官於河南閩廣鑄造嘉靖通寶錢三十四年題准雲南鑄錢事例四十四年寶源局鑄嘉靖錢其時所鑄錢有金背火漆璇邊三種又按嘉靖三十二年令照新式鑄洪武以下紀元九號錢云云今考仁宗英宗憲宗諸朝其鼓鑄事蹟悉别無明文然則以上洪熙正統天順成化等錢蓋皆嘉靖時所補鑄而景泰以出廟遂獨無錢文也右穆宗隆慶通寶錢按㑹典隆慶四年鑄考明初沿宋元之舊錢鈔互用至𢎞治後多用銀而鈔法不行惟俸錢獨支鈔如故至是時始以新鑄隆慶錢給京官俸云右神宗萬厯通寶錢按㑹典萬厯四年命户工二部准嘉靖錢式鑄萬厯通寶錢金背火漆一文重一錢二分五釐鏇邊一文重一錢三分又命十三布政司南北直𨽻俱開局鑄錢右光宗泰昌通錢錢按萬厯四十八年八月丙午朔光宗即位詔以明年為泰昌元年九月乙卯朔熹宗即位詔以明年為天啓元年改萬厯四十八年八月為泰昌元年光宗之立甫閲一月此錢或熹宗即位後所鑄然是冬尚未改天啓故仍稱泰昌也右熹宗天啓通寶錢二品小者制如泰昌錢大者背文穿上有十字旁曰一兩按是時兵部尚書王象乾請鑄當十當百當千三等大錢仿白金三品之制於是兩京皆鑄大錢後有言大錢之弊者詔南京停鑄大錢收大錢發局改鑄則此錢旋鑄旋罷固未嘗行使也右莊烈帝崇禎通寶錢二品微有大小按是時定錢式每文重一錢每千直銀一兩南都所鑄輕薄乃定每文重八分此二錢是也右崇禎通寶大錢背文有監字五字按莊烈帝末年敕鑄當五錢此錢蓋當五也錢録卷十三
