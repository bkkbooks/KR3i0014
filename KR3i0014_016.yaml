body:
  text: 錢録卷十六右五錢並見博古圖録謂是厭勝錢今仍之右辟邪錢中作符篆上下書福德二字一面作立獸如辟邪又方圜各一孔蓋以施組紃佩之用祓除不祥西京雜記史良娣合采宛轉絲繩繫身毒國寶鏡即此義也右辟兵錢一面曰去災除凶一面曰辟兵莫當旁作星文繞之務成子所謂琭琭如玉連連如珠者耶右太上呪字錢道家有太上太初太始太素太清諸名號按雲笈七籖太上者大道君誕於西那天鬱察山浮羅嶽丹元之阿云云其說至為虛誕此錢稱太上是也背文書符一人作叱鬼狀二人俯而聽命外有三孔取其可繫用以作耳右虎符錢按道家有神虎上符消魔智慧經其釋文曰神者靈也虎者威也上者太上符者信也消魔者滅鬼也智者日中之星也慧者宜以生生為急也此錢面文書符上作虎頭背文揚旗按劎勢若擒捕鬼物上麗以星文與釋文本義俱合右符印錢晉孫思邈作入山符文略仿佛背文為星官又一人跽而供花隨以一鶴右符印錢背文為星官又肖生二右天罡錢漢書玉衡杓建天之綱也又晉書北落西南一星曰天綱參同契注天罡即北斗也道家以禮斗為修攝而白玉蟾琅書序云作為符圖印訣罡呪之文此錢文蓋罡呪也右北斗錢一面作七星文凡二一面曰大泉五十用新莽錢文也舊譜謂蓄之禦火右北斗錢一面作七星又龜劍各一一面曰大泉五十與前同右北斗錢與前品同背文曰永通萬國用後周宣帝錢文也洪志又謂之元武錢右北斗錢文作九星其二麗於旗蓋北斗原九星七見二𨼆道家謂內輔一星外輔一星見之者吉又交劎上舉又一人帶劍屹立洪志謂之青溪宅錢緣南齊書祥瑞志所載齊世祖於青溪宅得錢一枚文與此合也右北斗錢一面為七星縈繞中作交劍下為龜蛇糾結之狀蓋元武象北辰方位也一面為十二地支並肖生為之右北斗錢洪志有之引顧烜說云此錢面文為北斗軒轅之象背文為立㦸龍鳯之形謂之北斗星錢亦謂軒轅錢右星官錢一面作星官符印朱雀龜蛇之象一面文曰皇帝萬嵗其制亦出於道家為祈祝製也右一品楷書本命星官四字按道家有祭星法常以其受生所直之日祈請司命語詳於洞章諸篇下作星官二蓋南極北極中央一鼎旁作龜鶴皆道家養生之說著之錢文亦祈夀之意一面為十二屬右一品與前同亦作星官狀下為鼎旁有一龍取象辰位也一面為一人趺坐一人執杖侍蓋南極老人之義右一品一面作星官又龜鶴各一上為玉兔一面作水紋篆書凡四可辨者萬國二字右支錢一面為十二屬一面作樹下一人趺坐前一獸為俯伏狀右支錢二前一品背文暗湛不甚可辨下仿佛作龜鶴形右支錢二亦肖十二屬特錯綜參伍與他品異前一品無字背文為神仙龜鶴之象後一品背文全蝕不可辨右四神錢朱雀元武青龍白虎並肖生為之右一種亦肖生洪志並謂是四神錢一面曰永安曰五男意如諺稱永保平安者而李孝美謂篆文如後魏永安五銖此錢蓋為祈祝用不必泥永安二字遂謂後魏紀元年號也右一種作兔犬各一亦地支所屬也右一種右文卓劍左文為龜蛇各一背文大泉五十與前北斗錢同右三辰錢日月各一又為北斗七星元門寶海經曰陽精為日隂精為月分日月之精為星辰一面曰常平五銖用北齊宣帝錢文也右日月錢日東月西作麗天之象右明月錢如篆書明月二字右星月錢作月從星狀右雙星錢穿四圍俱作二星連珠洪志謂之八星錢右雙星錢二星在穿上右三星錢穿上下俱作三星連珠洪志謂之柄文錢右七夕錢牽牛織女取㑹合意也亦見洪志引舊譜謂穿上為花穿下為草右一品穿下規作半月形有光𦦨𦦨騰上如火珠右一品為八卦位列一如文王後天圖外環以十二屬一面為星官符印亦道籙也錢録卷十六
