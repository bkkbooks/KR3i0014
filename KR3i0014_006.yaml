body:
  text: 錢録卷六右五代宋文帝四銖錢按文帝紀元嘉七年鑄文曰四銖重如其文右武帝孝建四銖錢按武帝紀孝建元年鑄顧烜譜云一邊為孝建一邊為四銖洪志引舊譜孝建二字薤葉文四銖則大篆也右廢帝子業二銖錢按子業紀永光元年二月庚寅鑄二銖錢三月甲辰罷右廢帝永光錢洪志引徐氏説辨其文曰永光右廢帝景和錢按通考廢帝景和二年鑄二銖錢文曰景和考大明八年閏五月子業即位其次年乙巳春正月乙未朔改元永光秋八月改元景和十一月被害明帝自立十二月改元泰始則景和無二年甚明通考所稱疑誤此錢蓋改元景和後所鑄非二年也輪郭肉好亦與二銖不同與二銖固當為兩種而馬氏誤合之為一耳右梁武帝鐵錢按本紀普通四年十二月戊午用給事中王子雲議始鑄鐵錢而隋食貨志亦言普通中鑄鐵錢顧烜言有五銖及五銖大吉大通大富等文此數品皆是右五銖女錢按食貨志梁五銖錢肉好周郭又别鑄除其肉郭謂之女錢即公式女錢也以其官鑄故謂之公式曰女錢者因其時有豐貨名男錢也張台曰背有好郭者公式女錢無好郭者女錢是誤以公式女錢為二而不知其固是一種今政之右太平百錢凡五種篆法各不同大小有間末一品錢字作金右定平一百定字漶缺右錢文曰五朱右對文五銖錢面背皆文曰五銖按隋書食貨志梁武帝時百姓或私以古錢交易有直百五銖五銖女錢太平百錢定平一百五銖稚錢五朱對文等號輕重不一又通考定平一百五銖文曰定平稚錢五銖文曰五銖又五銖文曰五朱又有對文錢其原未聞豐貨錢代謂之男錢云婦人佩之即生男也今諸錢皆梁以前鑄以其為武帝時民間所用爰録於此惟稚錢五銖與五銖品同異莫辨故弗志其直百一種巳入於蜀漢豐貨一種入於石趙此不重出也右敬帝四柱五銖按本紀太平二年夏四月己卯鑄四柱錢一準二十壬辰改一準十右兩柱五銖按隋書食貨志梁末又有兩柱錢與四柱同右陳宣帝大貨六銖錢陳書本紀大建十一年秋七月辛卯初用大貨六銖錢隋書食貨志云以一當五銖之十與五銖並行後還當一右後魏髙祖太和五銖錢北史食貨志髙祖始詔天下用錢十九年公鑄粗備文曰太和五銖右孝莊帝永安五銖錢按通考孝莊帝初私鑄者益更薄小從祕書郎楊侃議乃鑄五銖錢文曰永安五銖官自立罏亦聽人就鑄又隋書食貨志齊神武霸政之初承魏猶用永安五銖蓋此錢行用頗久故董逌又謂為北齊永安五銖而洪志乃别繫於東魏之末其實非二種也右永安土字錢有四出文洪志面文永安五銖幕文土字計後魏所鑄右永安錢四出文同前無土字洪志引三國典略云是令公百罏錢未可為據今附於土字錢之後右北齊文宣帝常平五銖錢按北史天保四年春正月鑄新錢文曰常平五銖又隋書食貨志文宣受禪除永安之錢改鑄常平五銖重如其文其錢甚貴且製造甚精至乾明皇建之間往往私鑄右後周武帝布泉二種篆各不同按後周書武帝紀保定元年秋七月更鑄錢文曰布泉以一當五與五銖並行又隋書食貨志後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢右武帝五行大布錢本紀及隋志並稱建德三年六月更鑄五行大布錢以一當十今按大字據篆法乃泉字殊不可曉右宣帝永通萬國錢本紀及隋志並稱大象元年鑄以一當十通考謂大成元年又鑄永通萬國錢以一當千與五行大布五銖三品並用今按宣帝大成元年二月辛巳改大成元年為大象元年此錢為十一月所鑄自應稱大象通考稱大成非是又千字亦十字之誤右一品篆文甚古異面文萬字鐘鼎篆背文可識者明字萬字餘黯蝕莫能辨以其面文同前附録於此錢録卷六
