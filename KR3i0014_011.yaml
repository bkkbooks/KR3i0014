body:
  text: 錢録卷十一右南宋髙宗建炎通寶錢靖康二年康王即位於南京改元建炎按食貨志建炎經兵鼓鑄皆廢然考本紀建炎元年九月壬辰鑄建炎通寶錢則此錢是也右建炎通寶大錢篆書真書二體此錢蓋與前品同鑄本紀建炎元年九月庚戌始通當二大錢於淮浙荆湖諸路按髙宗朝只當二及小平錢二種不聞别鑄此大錢意即當二本紀蓋指先朝大觀等舊錢後改為當三者非新鑄也右髙宗紹興元寶錢按建炎五年改元紹興本紀紹興元年八月壬午鑄紹興錢右紹興大錢二體書一曰元寶一曰通寶讀各不同按食貨志以李植提㸃鑄錢公事植言今泉司小平錢一萬八千緡折二錢六萬六千緍云云則前品蓋小平錢而此大錢則折二與建炎二種同也右紹興元寶大錢與前通寶一種同皆折二也背文曰月文如開元製右孝宗淳熙元寶大錢按乾道十二年改元淳熙本紀淳熙元年十二月丙辰罷鐡錢改鑄銅錢食貨志孝宗隆興元年詔鑄當二小平錢如紹興初注謂乾道淳熙迄於嘉泰開禧皆如之則此錢實與紹興折二同其背文八字十字十一字十二字十四字十六字則記是年所鑄蓋淳熙十六年之次年即改元紹熙也至本紀又載六年十月庚子四川行當三錢意是别鑄或舊錢只行於蜀耳右孝宗紹熙元寶錢小平錢也右紹熙元寶大錢折二錢也右寧宗慶元通寶錢背文穿上增漢字蓋鑄錢地如漢陽監是也食貨志稱併富民監於漢陽監可據右慶元通寶大錢按此錢大於前折二諸品考食貨志慶元三年復神泉監以所括銅器鑄當三大錢則此錢是也右寧宗嘉泰通寶大錢按慶元七年改元嘉泰此錢蓋當三與慶元當三錢同右寧宗嘉定通寶大錢較前品稍大按開禧四年改元嘉定本紀嘉定元年十二月庚午四川初行當五大錢食貨志嘉定元年即利州鑄當五大錢蓋當五也右嘉定通寶大錢折二錢也右理宗大宋元寶錢按嘉定十八年理宗即位改元寶慶本紀寶慶元年秋七月乙酉詔行大宋元寶錢食貨志寶慶元年新錢以大宋元寶為文右理宗紹定通寶錢按寶慶四年改元紹定此亦折二錢也右理宗端平通寶大錢按紹定七年改元端平此錢與嘉泰當三錢同應是當三錢也理宗朝専措置楮幣而銅冶大衰考本紀端平元年六月癸巳禁毁銅錢右理宗嘉熙大錢二種曰通寶曰重寶按端平四年改元嘉熙食貨志嘉熙元年新錢當二并小平錢並以嘉熙通寶為文當三錢以嘉熙重寶為文今前一種蓋當二後一種則當三也右理宗淳祐元寶大錢按嘉熙五年改元淳祐淳祐二年三月詔在外諸軍請給楮幣權以十八界三分增給又三年命淮東西總所餉軍劵錢並給楮四分則當時用楮仍與錢並行特楮賤不得不以錢權之故分配支給食貨志謂之品搭是也右淳祐通寶大錢背文有當百字錢質厚重過於諸大錢數倍而史無明文按本紀淳祐九年三月乙酉以程元鳳為江淮等路都大提㸃坑治鑄錢公事蓋是時所鑄又按淳祐十二年從監察御史劉元龍言遂令純用楮及至公私交弊明年仍用錢㑹中半則前此所云三分增給與給楮四分者又非定額矣賈似道當國主用㑹子亦曰交子後又變而為關子其意在於廢錢用楮故元龍純用楮之議顯為迎合然勢難久行卒不能盡廢圜法也右理宗皇宋元寶錢按淳祐十三年改元寶祐食貨志寶祐元年新錢以皇宋元寶為文右皇宋元寶大錢二種微有小大右理宗開慶通寶錢按寶祐七年改元開慶本紀開慶元年五月乙丑行開慶通寶錢右理宗景定元寶錢按開慶二年改元景定王圻續通考景定元年九月詔鑄新錢以景定元寶為文右景定元寶大錢三種右度宗咸淳元寶大錢二種按景定六年度宗即位改元咸淳此錢背文三字七字考咸淳七年元建國號越三年為帝㬎德祐元年又一年景炎一年祥興而宋皆無復置監開鑄之事矣右錢牌一面曰臨安府行用一面曰凖三百文省考元人孔行素至正雜記言南宋有錢牌長三寸有竒濶二寸今此尺度雖不同然為錢牌無疑曰省者建炎三年四月正官名合中書省門下省尚書省為一謂之知三省此蓋三省所鑄也南宋自建都杭州升為府終南宋一百五十餘年皆稱臨安府此錢不審為何時造據此則南宋當二當三當五當百諸大錢而外又有凖三百文之錢牌而志𫝊俱未之録想未久即罷廢不行耳今附入於南宋諸品之末可以補舊史之所未備錢録卷十一
