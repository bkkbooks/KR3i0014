body:
  text: 錢録卷十四右罽賓國錢前漢書罽賓國王治循鮮城去長安萬二千二百里以金銀為錢文為騎馬幕為人面自武帝時始通中國右烏弋山離國錢前漢書烏弋山離國去長安萬二千二百里東與罽賔國接自玊門陽關出南道厯鄯善而南行至烏弋山離南道極矣其錢文為人頭幕為騎馬右安息國錢前漢書安息國王治畨兜城去長安萬一千六百里東與烏弋山離國接亦以銀為錢文為王面幕為夫人面而史記大宛𫝊只言錢如其王面此錢為人面而幕文無形象如史記說右大月氏錢國前漢書大月氏國王治監氏城去長安萬一千六百里民俗錢貨與安息同此錢為人靣幕文如之意所謂幕為夫人面也又拾遺記三瞳國金幣效國王之面亦效王后之面又云軒渠國貨幣同右條支國錢前漢書安息長老傳聞條支有弱水西王母亦未嘗見也自條支乘水西行可百餘近日所出又太平寰宇記條支國市列錢貨其文為人幕為騎馬右何國錢隋書何國都阿蜜水南數里舊是康居之地大業中遣使貢方物洪志云何國錢以銀為之不開孔文為人面背為草木狀右拔汗國錢隋書作鏺汗云在蔥嶺之西五百餘里古渠搜國也新唐書拔汗至天寶三年改其國號寧逺洪志曰拔汗錢以金為之無文字又一種有三旋文並不開孔今所收面無文字背有三旋文右康國錢舊唐書康國即漢康居國也其俗生子以明膠置掌內言掌持錢如膠之黏物而洪志引徐氏譜云以銀為錢徑九分不開孔背面皆作人面形面文側而背文正面文繞以連珠之狀今此品適合右闍婆國錢面曰一文新唐書訶陵亦曰社婆曰闍婆有文字以貝多葉寫之宋史闍婆國在南海中翦銀葉為錢博易官以粟一斛二斗博金一錢今按此錢輕甚不類鑄造蓋宋史所云翦葉為之者右泥婆羅國錢舊唐書泥婆羅國在吐畨西以銅為錢面文為人背文為馬牛不穿孔新唐書並同又洪志引西域記曰泥婆羅出赤銅右大食國錢舊唐書大食國在波斯之西又廣州記曰生金出大食國凡諸貿易並使金錢洪志云此錢以金為之面文作象形形制甚小右驃國錢新唐書驃古朱波也自號突羅朱闍婆以金銀為錢形如半月號登伽陀亦曰足彈陀今所收只銀錢一種右碎葉國錢洪志曰鑌鐡為之形如連環聖厯中御史封思業使西域得之按新唐書西域𫝊出安西南地千里東曰熱海西有碎葉城右天竺國錢新唐書天竺漢身毒國也或曰摩伽陀曰婆羅門宋史婆羅門僧永世自云本國市易銅錢圓徑如中國之制但實其中不穿貫洪志載天竺錢亦不穿貫面無文與此錢合右梵字錢一洪志曰此錢銅色純赤文不可辨大抵類屋馱吐畨錢今按此錢蓋以赤銅為之與泥婆羅錢同右梵字錢二俱不可識或曰後一種為空界是雲四字洪武圖一為屋馱國錢一為吐畨錢按屋䭾即伏陀近吐畨並西域境多浮屠文字吐畨與唐世為昏姻故其錢背文有甲痕仿開元也然於諸史皆無證今附入於天竺錢之後右倭國錢喜通寶錢詳見洪志按舊唐書倭國者古倭奴國也去京師萬四千里頗有文字俗敬佛法右日本國錢四種曰和同開珍曰神功開珍曰萬年通寶曰隆平永寶皆𨽻書洪志引舊譜云並徑寸重五銖按新唐書言倭惡其名更號日本咸亨元年遣使來賀自云近日所出以為名或云日本乃小國為倭所并冒其號則日本即倭耳故宋祁不别為倭國𫝊右日本國乾文錢宋史雍熙元年日本國僧奝然與其徒五六人泛海而至獻銅器十餘件并國圖職貢今王年代紀各一卷奝然善𨽻書云其國交易用銅錢錢文曰乾文大寶按今所收錢缺大字如洪氏圖亦𨽻書與前四種同右髙麗國錢三種宋史髙麗一曰髙句麗地産銅崇寧後始知鼓鑄有海東通寶重寶三韓通寶三種錢又按朝鮮史略三韓馬韓辰韓辨韓也右篆書海東通寶錢洪志有此引雞林類事云通寶錢有篆文者製作特精右東國重寶錢董譜洪志並謂髙麗所鑄右交趾黎字錢宋㑹要載祕書丞朱正臣言前通判廣州時交州人貿易多擕黎字錢及砂蠟錢按宋史太平興國八年黎桓自稱權交州三使留後雍熙三年賜桓莭鉞蓋黎氏據交跡最久此錢穿下黎字記所鑄也右無文金銀錢按巴氏倓氏賨氏小月氏大秦國東沃沮阿鉤羌波斯國髙昌女國于闐杜薄新羅佛尼阿耆尼屈支伽畢試覩貨邏梵衍三佛齊層檀南毗俱以金銀為錢悉無文而莫可分别今各録一品不敢如洪氏强為綴屬也右無文小銀錢按新唐書投和在直蠟以南以農商自業銀作錢類榆莢此小錢倘是耶右一品洪志有之引李孝美說此錢徑寸五分重十五銖其文真書下注云或曰是外國鑄今録於異域諸錢之後錢録卷十四
